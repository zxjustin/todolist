<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List App</title>
<script defer src="main.js"></script></head>
<body>
    <div class="app-container">
        <!-- Sidebar with Projects -->
        <div class="sidebar">
            <h2>Projects</h2>
            <div id="projects-list">
                <!-- Projects will be rendered here by JavaScript -->
            </div>

            <form id="new-project-form">
                <input type="text" id="new-project-name" placeholder="New project name" required>
                <button type="submit">Add Project</button>
            </form>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <h1 id="current-project-name">Default</h1>

            <!-- Todo List -->
            <div id="todo-list">
                <!-- Todos will be rendered here by JavaScript -->
            </div>

            <!-- Add Todo Button -->
            <button id="add-todo-btn" class="add-todo-btn">+ Add Todo</button>
        </div>
    </div>

    <!-- Modal Overlay -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add New Todo</h3>
                <button id="modal-close-btn" class="modal-close-btn">&times;</button>
            </div>
            <form id="new-todo-form">
                <div class="form-group">
                    <label for="new-todo-title">Title:</label>
                    <input type="text" id="new-todo-title" required>
                </div>

                <div class="form-group">
                    <label for="new-todo-description">Description:</label>
                    <textarea id="new-todo-description"></textarea>
                </div>

                <div class="form-group">
                    <label for="new-todo-due-date">Due Date:</label>
                    <input type="date" id="new-todo-due-date" required>
                </div>

                <div class="form-group">
                    <label for="new-todo-priority">Priority:</label>
                    <select id="new-todo-priority">
                        <option value="Low">Low</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="new-todo-notes">Notes:</label>
                    <textarea id="new-todo-notes"></textarea>
                </div>

                <button type="submit">Add Todo</button>
            </form>
        </div>
    </div>
</body>
</html>
