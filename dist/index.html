<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List App</title>
    <link rel="stylesheet" href="styles.css">
<script defer src="main.js"></script></head>
<body>
    <div class="app-container">
        <!-- Sidebar with Projects -->
        <div class="sidebar">
            <h2>Projects</h2>
            <div id="projects-list">
                <!-- Projects will be loaded here -->
            </div>
            
            <form id="new-project-form">
                <input type="text" id="new-project-name" placeholder="New project name" required>
                <button type="submit">Add Project</button>
            </form>
        </div>
        
        <!-- Main Content -->
        <div class="main-content">
            <h1 id="current-project-name">Default Project</h1>
            
            <!-- Todo List -->
            <div id="todo-list">
                <!-- Todos will be loaded here -->
            </div>
            
            <!-- New Todo Form -->
            <div class="new-todo-container">
                <h2>Add New Todo</h2>
                <form id="new-todo-form">
                    <div class="form-group">
                        <label for="new-todo-title">Title:</label>
                        <input type="text" id="new-todo-title" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="new-todo-description">Description:</label>
                        <textarea id="new-todo-description"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="new-todo-due-date">Due Date:</label>
                        <input type="date" id="new-todo-due-date" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="new-todo-priority">Priority:</label>
                        <select id="new-todo-priority">
                            <option value="Low">Low</option>
                            <option value="Medium" selected>Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="new-todo-notes">Notes:</label>
                        <textarea id="new-todo-notes"></textarea>
                    </div>
                    
                    <button type="submit">Add Todo</button>
                </form>
            </div>
        </div>
    </div>
    
    <script src="todoModel.js"></script>
    <script src="todoController.js"></script>
    <script src="storageManager.js"></script>
    <script src="uiManager.js"></script>
    <script src="index.js"></script>
</body>
</html>
